<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concessions Register — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" /><link rel="stylesheet" href="../../css/components.css" /><link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
<aside class="sidebar" id="sidebar"></aside>
<div class="portal-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:var(--space-3)"><button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Concessions Register</span></div>
  </div>
  <div class="portal-content">
    <div class="portal-page-header"><div><h1>Concessions Register</h1><p>All customer concessions granted — click a row to open the order</p></div></div>
    <div class="filter-bar" style="display:flex;gap:var(--space-3);flex-wrap:wrap">
      <select class="form-select" id="filter-buyer" onchange="loadConcessions()" style="min-width:180px"><option value="">All buyers</option></select>
      <select class="form-select" id="filter-supplier" onchange="loadConcessions()" style="min-width:180px"><option value="">All suppliers</option></select>
      <input type="date" class="form-input" id="filter-date-from" onchange="loadConcessions()" title="From date" />
      <input type="date" class="form-input" id="filter-date-to" onchange="loadConcessions()" title="To date" />
    </div>
    <div class="table-wrapper"><table>
      <thead><tr><th>Order</th><th>Buyer</th><th>Supplier</th><th>Product</th><th>Delta</th><th>Signed</th><th>Adjustment</th></tr></thead>
      <tbody id="concessions-body"><tr><td colspan="7" style="text-align:center;color:var(--color-text-muted);padding:var(--space-8)">Loading…</td></tr></tbody>
    </table></div>
  </div>
</div>
<script src="../../js/supabase-client.js"></script><script src="../../js/auth.js"></script><script src="../../js/portal/auth-roles.js"></script><script src="../../js/portal/sidebar.js"></script>
<script src="../../js/portal-guard.js"></script><script src="../../js/portal/state-machine.js"></script><script src="../../js/portal/concessions.js"></script>
</body></html>
