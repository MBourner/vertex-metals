<!DOCTYPE html>
<!-- SHARED: update portal sidebar in all portal pages if changed -->
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYC Records — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" /><link rel="stylesheet" href="../../css/components.css" /><link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
<aside class="sidebar" id="sidebar"></aside>
<div class="portal-main">
  <div class="topbar"><div style="display:flex;align-items:center;gap:var(--space-3)"><button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">KYC Records</span></div><button onclick="document.getElementById('new-kyc-modal').classList.add('open')" class="btn btn-primary btn-sm">+ Add KYC Record</button></div>
  <div class="portal-content">
    <div class="portal-page-header"><div><h1>KYC Records</h1><p>Counterparty due diligence and sanctions screening records</p></div></div>
    <div class="table-wrapper"><table>
      <thead><tr><th>Company</th><th>Type</th><th>KYC Status</th><th>Risk Rating</th><th>Last Screened</th><th>Next Review</th></tr></thead>
      <tbody id="kyc-body"><tr><td colspan="6" style="text-align:center;color:var(--color-text-muted);padding:var(--space-8)">Loading...</td></tr></tbody>
    </table></div>
  </div>
</div>
<div class="modal-overlay" id="new-kyc-modal"><div class="modal-box"><button class="modal-close" onclick="document.getElementById('new-kyc-modal').classList.remove('open')">✕</button><h3>Add KYC Record</h3><div id="kyc-form-container"></div></div></div>
<script src="../../js/supabase-client.js"></script><script src="../../js/auth.js"></script><script src="../../js/portal/sidebar.js"></script>
<script src="../../js/portal-guard.js"></script><script src="../../js/portal/kyc.js"></script>
</body></html>
