<!DOCTYPE html>
<!-- SHARED: update portal sidebar in all portal pages if changed -->
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" /><link rel="stylesheet" href="../../css/components.css" /><link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Timeline ── */
    .timeline-strip { display:flex; align-items:flex-start; overflow-x:auto; padding:var(--space-5) 0 var(--space-4); gap:0; margin-bottom:var(--space-2); }
    .timeline-node { display:flex; flex-direction:column; align-items:center; min-width:110px; max-width:130px; }
    .timeline-dot { width:12px; height:12px; border-radius:50%; background:var(--color-border); border:2px solid var(--color-border); margin-bottom:var(--space-2); flex-shrink:0; }
    .timeline-node.done .timeline-dot { background:var(--color-accent); border-color:var(--color-accent); }
    .timeline-node.current .timeline-dot { background:var(--color-primary); border-color:var(--color-primary); width:16px; height:16px; box-shadow:0 0 0 3px rgba(var(--color-primary-rgb,0,40,85),.15); }
    .timeline-label { font-size:10px; font-weight:600; text-align:center; color:var(--color-text-muted); line-height:1.3; padding:0 var(--space-1); }
    .timeline-node.done .timeline-label, .timeline-node.current .timeline-label { color:var(--color-text); }
    .timeline-meta { font-size:9px; color:var(--color-text-muted); text-align:center; margin-top:2px; }
    .timeline-connector { flex:1; height:2px; background:var(--color-border); min-width:16px; margin-top:5px; flex-shrink:0; }
    .timeline-connector.done { background:var(--color-accent); }
    /* ── Tabs ── */
    .tab-bar { display:flex; gap:0; border-bottom:2px solid var(--color-border); margin-bottom:var(--space-6); overflow-x:auto; scrollbar-width:none; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn { background:none; border:none; padding:var(--space-2) var(--space-4); font-family:var(--font-display); font-size:13px; font-weight:500; color:var(--color-text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s; white-space:nowrap; flex-shrink:0; }
    .tab-btn:hover { color:var(--color-text); }
    .tab-btn.active { color:var(--color-accent); border-bottom-color:var(--color-accent); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    /* ── Order topbar info ── */
    .order-topbar-info { display:flex; align-items:center; gap:var(--space-4); flex-wrap:wrap; font-size:var(--text-sm); min-width:0; }
    .order-topbar-ref { font-family:var(--font-display); font-weight:700; font-size:var(--text-base); }
  </style>
</head>
<body class="portal-body">
<aside class="sidebar" id="sidebar"></aside>

<div class="portal-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:var(--space-3);flex:1;min-width:0;overflow:hidden">
      <button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="order-topbar-ref" id="topbar-reference" style="white-space:nowrap;flex-shrink:0">Loading…</span>
      <span id="topbar-state" style="flex-shrink:0"></span>
      <span id="topbar-buyer" style="color:var(--color-text-muted);font-size:var(--text-sm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    </div>
    <div style="display:flex;align-items:center;gap:var(--space-4);flex-shrink:0">
      <span id="topbar-value" style="font-weight:600;font-size:var(--text-sm);white-space:nowrap"></span>
      <a href="index.html" class="btn btn-ghost btn-sm">← Orders</a>
    </div>
  </div>

  <div class="portal-content">
    <!-- Global alert -->
    <div id="page-alert" class="alert" style="display:none;margin-bottom:var(--space-4)"></div>

    <!-- Timeline strip -->
    <div class="panel" style="margin-bottom:var(--space-4)">
      <div class="panel-body" style="padding-top:var(--space-3);padding-bottom:var(--space-3)">
        <div id="timeline-strip" class="timeline-strip">
          <span style="color:var(--color-text-muted);font-size:var(--text-sm)">Loading…</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="summary"    onclick="switchTab('summary')">Summary</button>
      <button class="tab-btn"        data-tab="documents"  onclick="switchTab('documents')">Documents</button>
      <button class="tab-btn"        data-tab="emails"     onclick="switchTab('emails')">Emails</button>
      <button class="tab-btn"        data-tab="verif-log"  onclick="switchTab('verif-log')">Verification Log</button>
      <button class="tab-btn"        data-tab="concession" onclick="switchTab('concession')">Concession</button>
      <button class="tab-btn"        data-tab="dispute"    onclick="switchTab('dispute')">Dispute</button>
      <button class="tab-btn"        data-tab="audit-log"  onclick="switchTab('audit-log')">Audit Log</button>
    </div>

    <div id="tab-summary"    class="tab-pane active"><div style="color:var(--color-text-muted)">Loading…</div></div>
    <div id="tab-documents"  class="tab-pane"></div>
    <div id="tab-emails"     class="tab-pane"></div>
    <div id="tab-verif-log"  class="tab-pane"></div>
    <div id="tab-concession" class="tab-pane"></div>
    <div id="tab-dispute"    class="tab-pane"></div>
    <div id="tab-audit-log"  class="tab-pane"></div>
  </div>
</div>

<!-- Transition modal -->
<div class="modal-overlay" id="transition-modal">
  <div class="modal-box" style="max-width:480px">
    <button class="modal-close" onclick="document.getElementById('transition-modal').classList.remove('open')">✕</button>
    <h3 id="transition-modal-title">Confirm Transition</h3>
    <form onsubmit="submitTransition(event)" style="margin-top:var(--space-4)">
      <input type="hidden" id="transition-to-state" />
      <div class="form-group">
        <label class="form-label">Reason Code (optional)</label>
        <select class="form-select" id="transition-reason-code">
          <option value="">— None —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="transition-notes" rows="3" placeholder="Add context for the audit log"></textarea>
      </div>
      <div id="transition-error" style="color:var(--color-danger);font-size:var(--text-sm);margin-bottom:var(--space-3)"></div>
      <div style="display:flex;justify-content:flex-end;gap:var(--space-3)">
        <button type="button" onclick="document.getElementById('transition-modal').classList.remove('open')" class="btn btn-ghost">Cancel</button>
        <button type="submit" class="btn btn-primary" id="transition-submit-btn">Confirm</button>
      </div>
    </form>
  </div>
</div>

<script src="../../js/supabase-client.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/portal/auth-roles.js"></script>
<script src="../../js/portal/sidebar.js"></script>

<script src="../../js/portal-guard.js"></script>
<script src="../../js/portal/state-machine.js"></script>
<script src="../../js/portal/orders-detail.js"></script>
</body></html>
