<!DOCTYPE html>
<!-- SHARED: update portal sidebar in all portal pages if changed -->
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Lines — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" /><link rel="stylesheet" href="../../css/components.css" /><link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
<aside class="sidebar" id="sidebar"></aside>
<div class="portal-main">
  <div class="topbar"><div style="display:flex;align-items:center;gap:var(--space-3)"><button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Product Lines</span></div><div style="display:flex;gap:var(--space-2)"><button onclick="openManageFamiliesModal()" class="btn btn-secondary btn-sm">Manage Families</button><button onclick="document.getElementById('add-pl-modal').classList.add('open')" class="btn btn-primary btn-sm">+ Add Product Line</button></div></div>
  <div class="portal-content">
    <div class="portal-page-header"><div><h1>Product Lines</h1><p>Product catalogue with default pricing parameters used for automatic trade calculations</p></div></div>
    <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap;align-items:center">
      <select class="form-select" id="filter-family" onchange="loadProductLines()" style="min-width:160px">
        <option value="">All families</option>
      </select>
    </div>
    <div class="table-wrapper"><table>
      <thead><tr><th>Subtype</th><th>Name</th><th>CN Code</th><th>Markup</th><th>VAT</th><th>Std Price/MT</th><th>Mkt Ref/MT</th><th>Status</th><th></th></tr></thead>
      <tbody id="pl-body"><tr><td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:var(--space-8)">Loading...</td></tr></tbody>
    </table></div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-pl-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('add-pl-modal').classList.remove('open')">✕</button>
    <h3>Add Product Line</h3>
    <div id="add-pl-form-container"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-pl-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('edit-pl-modal').classList.remove('open')">✕</button>
    <h3>Edit Product Line</h3>
    <div id="edit-pl-form-container"></div>
  </div>
</div>

<!-- Manage Families Modal -->
<div class="modal-overlay" id="manage-families-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('manage-families-modal').classList.remove('open')">✕</button>
    <h3>Manage Product Families</h3>
    <div id="manage-families-container"></div>
  </div>
</div>

<!-- Edit Family Modal -->
<div class="modal-overlay" id="edit-family-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('edit-family-modal').classList.remove('open')">✕</button>
    <h3>Edit Product Family</h3>
    <div id="edit-family-form-container"></div>
  </div>
</div>

<script src="../../js/supabase-client.js"></script><script src="../../js/auth.js"></script><script src="../../js/portal/sidebar.js"></script>
<script src="../../js/portal-guard.js"></script><script src="../../js/portal/product-lines.js"></script>
</body></html>
