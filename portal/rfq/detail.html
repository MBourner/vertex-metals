<!DOCTYPE html>
<!-- SHARED: update portal sidebar in all portal pages if changed -->
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFQ Detail — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" /><link rel="stylesheet" href="../../css/components.css" /><link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
<aside class="sidebar" id="sidebar"></aside>
<div class="portal-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:var(--space-3)">
      <button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="topbar-title">RFQ Detail</span>
    </div>
    <a href="index.html" class="btn btn-ghost btn-sm">← Back to RFQs</a>
  </div>
  <div class="portal-content">
    <div class="portal-page-header"><div><h1 id="rfq-title">Loading...</h1></div></div>
    <div class="panel"><div class="panel-body"><div id="rfq-detail"><div style="color:var(--color-text-muted)">Loading...</div></div></div></div>
  </div>
</div>

<!-- Create Customer Quote Modal -->
<div class="modal-overlay" id="create-quote-modal">
  <div class="modal-box" style="max-width:640px">
    <button class="modal-close" onclick="document.getElementById('create-quote-modal').classList.remove('open')">✕</button>
    <h3>Create Customer Quote</h3>
    <div id="create-quote-form-container"></div>
  </div>
</div>

<!-- Convert Quote to Order Modal -->
<div class="modal-overlay" id="convert-order-modal">
  <div class="modal-box" style="max-width:560px">
    <button class="modal-close" onclick="document.getElementById('convert-order-modal').classList.remove('open')">✕</button>
    <h3>Convert Quote to Order</h3>
    <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-4)">Creates a new order in the verification queue, pre-filled from this customer quote.</p>
    <div id="convert-order-form-container"></div>
  </div>
</div>

<script src="../../js/supabase-client.js"></script><script src="../../js/auth.js"></script><script src="../../js/portal/sidebar.js"></script>
<script src="../../js/portal-guard.js"></script><script src="../../js/portal/rfq.js"></script>
</body></html>
