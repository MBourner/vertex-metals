<!DOCTYPE html>
<!-- SHARED: update portal sidebar in all portal pages if changed -->
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFQ Inbox — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
<!-- SIDEBAR (copy from dashboard.html — update all portal pages if changed) -->
<aside class="sidebar" id="sidebar"></aside>

<div class="portal-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:var(--space-3)">
      <button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title">RFQ Inbox</span>
    </div>
  </div>
  <div class="portal-content">
    <div class="portal-page-header">
      <div><h1>RFQ Inbox</h1><p>All buyer and supplier enquiries submitted via the public contact form</p></div>
    </div>
    <div class="filter-bar">
      <select class="form-select" id="filter-status" style="min-width:140px">
        <option value="">All statuses</option>
        <option value="new">New</option>
        <option value="in_review">In Review</option>
        <option value="quoted">Quoted</option>
        <option value="closed">Closed</option>
      </select>
      <select class="form-select" id="filter-type" style="min-width:140px">
        <option value="">All types</option>
        <option value="buyer">Buyer</option>
        <option value="supplier">Supplier</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="loadRfqs()">Filter</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Date</th><th>Name</th><th>Company</th><th>Type</th><th>Product Interest</th><th>Status</th></tr></thead>
        <tbody id="rfq-table-body"><tr><td colspan="6" style="text-align:center;color:var(--color-text-muted);padding:var(--space-8)">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../js/supabase-client.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/portal/sidebar.js"></script>

<script src="../../js/portal-guard.js"></script>
<script src="../../js/portal/rfq.js"></script>
</body>
</html>
