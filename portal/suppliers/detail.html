<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supplier — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" /><link rel="stylesheet" href="../../css/components.css" /><link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .tab-bar { display:flex; gap:0; border-bottom:2px solid var(--color-border); margin-bottom:var(--space-6); overflow-x:auto; }
    .tab-btn { background:none; border:none; padding:var(--space-3) var(--space-5); font-family:var(--font-display); font-size:var(--text-sm); font-weight:500; color:var(--color-text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; }
    .tab-btn:hover { color:var(--color-text); }
    .tab-btn.active { color:var(--color-accent); border-bottom-color:var(--color-accent); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
  </style>
</head>
<body class="portal-body">
<aside class="sidebar" id="sidebar"></aside>
<div class="portal-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:var(--space-3)"><button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title" id="topbar-title">Supplier</span></div>
    <a href="index.html" class="btn btn-ghost btn-sm">← Suppliers</a>
  </div>
  <div class="portal-content">
    <div id="supplier-header" style="margin-bottom:var(--space-6)"><div style="color:var(--color-text-muted)">Loading…</div></div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="audits"      onclick="switchTab('audits')">Audit History</button>
      <button class="tab-btn"        data-tab="orders"      onclick="switchTab('orders')">Orders</button>
      <button class="tab-btn"        data-tab="concessions" onclick="switchTab('concessions')">Concessions</button>
      <button class="tab-btn"        data-tab="disputes"    onclick="switchTab('disputes')">Disputes</button>
      <button class="tab-btn"        data-tab="sanctions"   onclick="switchTab('sanctions')">Sanctions</button>
      <button class="tab-btn"        data-tab="kyc"         onclick="switchTab('kyc')">KYC</button>
    </div>
    <div id="tab-audits"      class="tab-pane active"><div style="color:var(--color-text-muted)">Loading…</div></div>
    <div id="tab-orders"      class="tab-pane"></div>
    <div id="tab-concessions" class="tab-pane"></div>
    <div id="tab-disputes"    class="tab-pane"></div>
    <div id="tab-sanctions"   class="tab-pane"></div>
    <div id="tab-kyc"         class="tab-pane"></div>
  </div>
</div>
<script src="../../js/supabase-client.js"></script><script src="../../js/auth.js"></script><script src="../../js/portal/auth-roles.js"></script><script src="../../js/portal/sidebar.js"></script>
<script src="../../js/portal-guard.js"></script><script src="../../js/portal/state-machine.js"></script><script src="../../js/portal/suppliers-detail.js"></script>
</body></html>
