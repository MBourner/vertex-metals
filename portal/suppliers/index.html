<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supplier Register — Vertex Metals Portal</title>
  <link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" /><link rel="stylesheet" href="../../css/components.css" /><link rel="stylesheet" href="../../css/portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
<aside class="sidebar" id="sidebar"></aside>
<div class="portal-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:var(--space-3)"><button class="topbar-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Supplier Register</span></div>
  </div>
  <div class="portal-content">
    <div class="portal-page-header"><div><h1>Supplier Register</h1><p>Approved and prospective suppliers — audit status and compliance at a glance</p></div></div>
    <div class="filter-bar" style="display:flex;gap:var(--space-3);flex-wrap:wrap">
      <input type="text" class="form-input" id="filter-search" placeholder="Search by name or country…" style="min-width:200px" oninput="loadSuppliers()" />
      <select class="form-select" id="filter-status" onchange="loadSuppliers()" style="min-width:160px">
        <option value="">All statuses</option>
        <option value="approved">Approved</option>
        <option value="under_audit">Under Audit</option>
        <option value="prospect">Prospect</option>
        <option value="suspended">Suspended</option>
        <option value="delisted">Delisted</option>
      </select>
    </div>
    <div class="table-wrapper"><table>
      <thead><tr><th>Company</th><th>Country</th><th>Status</th><th>Next Audit Due</th><th>Last Sanctions Screen</th><th>Active Orders</th><th></th></tr></thead>
      <tbody id="suppliers-body"><tr><td colspan="7" style="text-align:center;color:var(--color-text-muted);padding:var(--space-8)">Loading…</td></tr></tbody>
    </table></div>
  </div>
</div>
<script src="../../js/supabase-client.js"></script><script src="../../js/auth.js"></script><script src="../../js/portal/auth-roles.js"></script><script src="../../js/portal/sidebar.js"></script>
<script src="../../js/portal-guard.js"></script><script src="../../js/portal/state-machine.js"></script><script src="../../js/portal/suppliers.js"></script>
</body></html>
